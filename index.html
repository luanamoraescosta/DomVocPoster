<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Monastery Data Processor — Interactive Notebook</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="page-header">
      <h1>Monastery Data Processor — Interactive Notebook</h1>
      <p class="subtitle">
        This page reproduces the notebook, but everything runs in the browser.
      </p>
    </header>

    <main class="page-main">
      <section
        id="pyodideStatus"
        class="status-card"
        aria-live="polite"
        aria-atomic="true"
      >
        <p>Initializing Pyodide… Please wait while we load the Python environment in your browser.</p>
      </section>

      <section class="toolbar" aria-label="Notebook controls">
        <button id="runAllBtn" type="button" disabled>
          Run the whole notebook
        </button>

        <span
          id="globalLoader"
          class="loader"
          hidden
          aria-hidden="true"
        ></span>

        <output
          id="statusMessage"
          class="status-message"
          role="status"
          aria-live="polite"
        ></output>
      </section>

      <hr />

      <section class="notebook-container" aria-label="Notebook area">
        <aside id="notebook-index" class="index-sidebar" aria-label="Contents">
          <h2 class="sidebar-title">Contents</h2>
          <nav id="index-content" class="index-content"></nav>
        </aside>

        <section
          id="notebook"
          class="notebook-main"
          aria-label="Notebook cells"
        ></section>
      </section>
    </main>

    <script type="module">
      import "./js/utils.js";
      import "./js/pyodide-loader.js";
      import "./js/package-installer.js";
      import "./js/file-loader.js";
      import "./js/notebook-runner.js";
      import { initializeApp } from "./js/main.js";

      initializeApp();
    </script>
  </body>
</html>
